<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRS - 그라운드룰 기획안 (1안 / 2안)</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f6fa; color: #1e1e1e; font-size: 13px;
    display: flex; height: 100vh; overflow: hidden;
  }

  /* ───── Sidebar ───── */
  .sidebar {
    width: 180px; min-width: 180px; background: #fff;
    border-right: 1px solid #e8e8ec;
    display: flex; flex-direction: column; height: 100vh; z-index: 10;
  }
  .sidebar-logo {
    display: flex; align-items: center; gap: 8px;
    padding: 18px 20px 14px; font-weight: 700; font-size: 16px; color: #1e1e1e;
  }
  .sidebar-logo .logo-icon {
    width: 28px; height: 28px; background: #1e1e1e; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 800; font-size: 14px;
  }
  .sidebar-nav { flex: 1; padding: 4px 8px; overflow-y: auto; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px;
    border-radius: 8px; color: #5f5f6b; cursor: pointer; font-size: 13.5px;
    transition: background .15s; text-decoration: none;
  }
  .nav-item:hover { background: #f5f6fa; }
  .nav-item.active { background: #f0f0f5; color: #1e1e1e; font-weight: 600; }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .nav-divider { height: 1px; background: #e8e8ec; margin: 6px 12px; }
  .sidebar-bottom { padding: 12px; border-top: 1px solid #e8e8ec; }
  .sidebar-user { display: flex; align-items: center; gap: 8px; padding: 8px; font-size: 12px; }
  .sidebar-user .avatar {
    width: 30px; height: 30px; border-radius: 50%; background: #ddd;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: #555;
  }
  .sidebar-user .user-info { display: flex; flex-direction: column; }
  .sidebar-user .user-name { font-weight: 600; color: #1e1e1e; font-size: 12.5px; }
  .sidebar-user .user-email { color: #8e8e9a; font-size: 11px; }

  /* ───── Main ───── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .top-header { background: #fff; border-bottom: 1px solid #e8e8ec; padding: 18px 28px 0; }
  .top-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .team-title { font-size: 18px; font-weight: 700; }
  .header-actions { display: flex; align-items: center; gap: 10px; }
  .team-avatars { display: flex; align-items: center; }
  .team-avatars .av {
    width: 30px; height: 30px; border-radius: 50%; border: 2px solid #fff;
    margin-left: -8px; display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; color: #fff;
  }
  .team-avatars .av:first-child { margin-left: 0; }
  .team-avatars .av-more { background: #e8e8ec; color: #555; font-size: 10px; font-weight: 600; }
  .btn-setting {
    display: flex; align-items: center; gap: 5px; padding: 6px 14px;
    border-radius: 8px; border: 1px solid #e0e0e5; background: #fff;
    font-size: 12.5px; color: #555; cursor: pointer;
  }
  .btn-tutorial {
    display: flex; align-items: center; gap: 5px; padding: 6px 14px;
    border-radius: 8px; border: 1px solid #e0e0e5; background: #fff;
    font-size: 12.5px; color: #f59e0b; cursor: pointer;
  }
  .tabs { display: flex; gap: 0; }
  .tab {
    padding: 10px 16px; color: #8e8e9a; font-size: 13.5px; cursor: pointer;
    border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap;
  }
  .tab:hover { color: #555; }
  .tab.active { color: #1e1e1e; font-weight: 600; border-bottom-color: #1e1e1e; }

  /* Content */
  .content { flex: 1; overflow: auto; padding: 20px 28px 40px; }
  .view-panel { display: none; }
  .view-panel.active { display: block; }

  /* ════════════════════════════════════════════════
     1안 — 매트릭스 뷰 스타일
     ════════════════════════════════════════════════ */

  .date-bar {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; margin-bottom: 20px;
  }
  .date-bar .arrow {
    width: 30px; height: 30px; border-radius: 6px;
    border: 1px solid #e0e0e5; background: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #888;
  }
  .date-bar .arrow:hover { background: #f5f6fa; }
  .date-bar .date-text { font-size: 15px; font-weight: 600; }
  .date-bar .btn-today {
    padding: 5px 14px; border-radius: 6px;
    border: 1px solid #e0e0e5; background: #fff;
    font-size: 12.5px; color: #555; cursor: pointer;
  }
  .date-bar .btn-today:hover { background: #f5f6fa; }

  .v1-summary-cards {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 14px; margin-bottom: 20px;
  }
  .v1-summary-card {
    background: #fff; border-radius: 12px; padding: 18px 20px;
    border: 1px solid #e8e8ec;
  }
  .v1-summary-card .label { font-size: 12px; color: #8e8e9a; margin-bottom: 8px; }
  .v1-summary-card .value { font-size: 26px; font-weight: 700; }
  .v1-summary-card .sub { font-size: 11.5px; color: #8e8e9a; margin-top: 4px; }
  .v1-summary-card .value.green { color: #22c55e; }
  .v1-summary-card .value.red { color: #ef4444; }
  .v1-summary-card .value.orange { color: #f59e0b; }
  .v1-summary-card .value.blue { color: #3b82f6; }

  .filter-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-group .filter-label { font-size: 12px; color: #8e8e9a; margin-right: 4px; }
  .chip {
    padding: 5px 14px; border-radius: 20px; border: 1px solid #e0e0e5;
    background: #fff; font-size: 12.5px; color: #5f5f6b; cursor: pointer;
    transition: all .15s; max-width: 200px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .chip:hover { border-color: #bbb; }
  .chip.active { background: #1e1e1e; color: #fff; border-color: #1e1e1e; }
  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    width: 32px; height: 32px; border-radius: 6px; border: 1px solid #e0e0e5;
    background: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: #8e8e9a;
  }
  .view-btn.active { background: #1e1e1e; color: #fff; border-color: #1e1e1e; }

  .alert-bar {
    background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px;
    padding: 12px 18px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px; font-size: 12.5px; color: #92400e;
  }
  .alert-bar .alert-icon { font-size: 16px; }
  .alert-bar .alert-rule { font-weight: 600; }
  .alert-bar.hidden { display: none; }

  /* Matrix */
  .matrix-wrapper {
    background: #fff; border-radius: 12px; border: 1px solid #e8e8ec; overflow: hidden;
  }
  .matrix-scroll { overflow-x: auto; overflow-y: auto; max-height: calc(100vh - 360px); }
  .matrix-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12.5px; }
  .matrix-table thead th {
    position: sticky; top: 0; z-index: 3; background: #fafafa;
    border-bottom: 1px solid #e8e8ec; padding: 10px 6px;
    font-weight: 600; text-align: center; white-space: nowrap; font-size: 12px;
  }
  .matrix-table thead th:first-child {
    position: sticky; left: 0; z-index: 5; background: #fafafa;
    min-width: 280px; text-align: left; padding-left: 16px;
  }
  .matrix-table thead th:last-child {
    position: sticky; right: 0; z-index: 4; background: #f0f7ff; min-width: 72px;
  }
  .matrix-table thead th .member-name { font-size: 12px; font-weight: 600; color: #1e1e1e; }
  .matrix-table thead th .member-role { font-size: 10px; color: #8e8e9a; font-weight: 400; }
  .group-row td {
    background: #f8f8fb; padding: 8px 16px; font-weight: 700; font-size: 12px;
    color: #5f5f6b; border-bottom: 1px solid #e8e8ec;
    position: sticky; left: 0; cursor: pointer;
  }
  .group-row td .group-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 6px; font-size: 11.5px; font-weight: 600;
  }
  .group-row td .group-count { font-size: 11px; font-weight: 400; color: #8e8e9a; margin-left: 6px; }
  .group-row td .chevron { display: inline-block; transition: transform .2s; font-size: 10px; margin-right: 4px; }
  .group-row td .chevron.collapsed { transform: rotate(-90deg); }
  .matrix-table tbody td {
    padding: 10px 6px; text-align: center; border-bottom: 1px solid #f0f0f3; vertical-align: middle;
  }
  .matrix-table tbody td:first-child {
    position: sticky; left: 0; z-index: 2; background: #fff;
    text-align: left; padding-left: 28px; font-size: 12.5px; color: #333;
    min-width: 280px; max-width: 320px;
  }
  .matrix-table tbody td:last-child {
    position: sticky; right: 0; z-index: 1; background: #f0f7ff;
    font-weight: 700; font-size: 12.5px; min-width: 72px;
  }
  .matrix-table tbody tr:hover td { background: #fafbff; }
  .matrix-table tbody tr:hover td:first-child { background: #f5f7ff; }
  .matrix-table tbody tr:hover td:last-child { background: #e8f0fd; }
  .rule-name { display: flex; flex-direction: column; gap: 2px; }
  .rule-name .rule-text { font-size: 12.5px; color: #1e1e1e; line-height: 1.4; }
  .rule-name .rule-detail { font-size: 11px; color: #8e8e9a; }
  .cell { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; font-weight: 700; font-size: 13px; }
  .cell.comply { background: #dcfce7; color: #16a34a; }
  .cell.violate { background: #fee2e2; color: #dc2626; }
  .cell.na { background: #f3f4f6; color: #9ca3af; font-size: 16px; }
  .rate { font-weight: 700; }
  .rate.high { color: #16a34a; }
  .rate.mid { color: #f59e0b; }
  .rate.low { color: #dc2626; }
  .matrix-table tfoot td {
    position: sticky; bottom: 0; z-index: 3; background: #fafafa;
    border-top: 2px solid #e8e8ec; padding: 10px 6px;
    text-align: center; font-weight: 700; font-size: 12.5px;
  }
  .matrix-table tfoot td:first-child {
    position: sticky; left: 0; z-index: 5; background: #fafafa;
    text-align: left; padding-left: 16px; color: #5f5f6b;
  }
  .matrix-table tfoot td:last-child {
    position: sticky; right: 0; z-index: 4; background: #e0ecff; font-size: 13px;
  }
  .person-view { display: none; }
  .person-view.active { display: block; }
  .matrix-wrapper.hidden { display: none; }
  .person-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .person-card {
    background: #fff; border-radius: 12px; border: 1px solid #e8e8ec;
    padding: 18px; transition: box-shadow .15s;
  }
  .person-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.06); }
  .person-card-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f3;
  }
  .person-card-header .pc-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: #fff;
  }
  .person-card-header .pc-info { flex: 1; }
  .person-card-header .pc-name { font-weight: 600; font-size: 13.5px; }
  .person-card-header .pc-role { font-size: 11px; color: #8e8e9a; }
  .person-card-header .pc-rate { font-size: 18px; font-weight: 700; }
  .person-card-rules { display: flex; flex-direction: column; gap: 6px; }
  .pc-rule { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
  .pc-rule .pc-status { width: 22px; height: 22px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .pc-rule .pc-status.comply { background: #dcfce7; color: #16a34a; }
  .pc-rule .pc-status.violate { background: #fee2e2; color: #dc2626; }
  .pc-rule .pc-status.na { background: #f3f4f6; color: #9ca3af; }
  .pc-rule .pc-rule-text { font-size: 12px; color: #333; flex: 1; }
  .pc-rule .pc-freq { font-size: 10px; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }

  /* ════════════════════════════════════════════════
     2안 — 프로그레스 대시보드 스타일
     ════════════════════════════════════════════════ */

  .v2-summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
  .v2-summary-card { background: #fff; border-radius: 12px; padding: 18px 20px; border: 1px solid #e8e8ec; }
  .v2-summary-card .s-label { font-size: 12px; color: #8e8e9a; margin-bottom: 6px; }
  .v2-summary-card .s-value { font-size: 28px; font-weight: 700; }
  .v2-summary-card .s-sub { font-size: 11.5px; color: #8e8e9a; margin-top: 4px; }
  .s-value.green { color: #16a34a; }
  .s-value.red { color: #ef4444; }
  .s-value.blue { color: #3b82f6; }

  .rule-group { background: #fff; border-radius: 12px; border: 1px solid #e8e8ec; margin-bottom: 16px; overflow: hidden; }
  .group-header { border-bottom: 1px solid #f0f0f3; }
  .group-header-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 0; cursor: pointer; user-select: none;
  }
  .group-header-top:hover { background: #fafbfc; }
  .group-header-left { display: flex; align-items: center; gap: 10px; }
  .group-chevron { font-size: 11px; color: #8e8e9a; transition: transform .2s; width: 16px; text-align: center; }
  .group-chevron.collapsed { transform: rotate(-90deg); }
  .group-name { font-size: 14px; font-weight: 700; color: #1e1e1e; }
  .group-rule-count { font-size: 11.5px; color: #8e8e9a; font-weight: 400; background: #f0f0f5; padding: 2px 8px; border-radius: 10px; }
  .group-header-right { display: flex; align-items: center; gap: 16px; }
  .group-rate { font-size: 13px; font-weight: 700; }
  .group-rate.high { color: #16a34a; }
  .group-rate.mid { color: #f59e0b; }
  .group-rate.low { color: #ef4444; }
  .group-bar-mini { width: 80px; height: 6px; background: #f0f0f3; border-radius: 3px; overflow: hidden; }
  .group-bar-mini-fill { height: 100%; border-radius: 3px; transition: width .3s; }
  .group-header-bottom { display: flex; align-items: center; justify-content: space-between; padding: 8px 20px 12px; }
  .group-period-chips { display: flex; gap: 4px; align-items: center; }
  .gp-chip {
    padding: 3px 12px; border-radius: 14px; border: 1px solid #e0e0e5;
    background: #fff; font-size: 11.5px; color: #8e8e9a; cursor: pointer;
    transition: all .12s; line-height: 1.4;
  }
  .gp-chip:hover { border-color: #bbb; color: #555; }
  .gp-chip.active { background: #1e1e1e; color: #fff; border-color: #1e1e1e; }
  .group-period-info { font-size: 11px; color: #b0b0ba; }
  .group-period-info strong { color: #8e8e9a; }
  .rule-list { padding: 0; }
  .rule-list.collapsed { display: none; }
  .rule-item { padding: 14px 20px; border-bottom: 1px solid #f5f5f8; transition: background .1s; }
  .rule-item:last-child { border-bottom: none; }
  .rule-item:hover { background: #fafbff; }
  .rule-item-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .v2-rule-text { flex: 1; font-size: 13px; font-weight: 500; color: #1e1e1e; }
  .rule-detail-label { font-size: 11px; color: #8e8e9a; font-weight: 400; }
  .rule-stats { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .rule-count { font-size: 13px; font-weight: 700; min-width: 60px; text-align: right; }
  .rule-rate { font-size: 13px; font-weight: 700; min-width: 44px; text-align: right; }
  .rule-rate.high { color: #16a34a; }
  .rule-rate.mid { color: #f59e0b; }
  .rule-rate.low { color: #ef4444; }
  .rule-warn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 50%;
    background: #fef3c7; color: #d97706; font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .progress-row { display: flex; align-items: center; gap: 12px; }
  .progress-bar { flex: 1; height: 8px; background: #f0f0f3; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width .4s ease; }
  .progress-fill.high { background: #22c55e; }
  .progress-fill.mid { background: #f59e0b; }
  .progress-fill.low { background: #ef4444; }
  .rule-detail-panel { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #e8e8ec; display: none; }
  .rule-detail-panel.open { display: block; }
  .detail-toggle {
    font-size: 11.5px; color: #6366f1; cursor: pointer;
    margin-top: 6px; display: inline-flex; align-items: center; gap: 4px;
  }
  .detail-toggle:hover { text-decoration: underline; }
  .member-section { margin-bottom: 8px; }
  .member-section-label { font-size: 11px; color: #8e8e9a; margin-bottom: 6px; font-weight: 600; }
  .member-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .member-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 16px; font-size: 11.5px; font-weight: 500;
  }
  .member-pill.done { background: #dcfce7; color: #15803d; }
  .member-pill.done .pill-date { color: #4ade80; font-size: 10px; }
  .member-pill.pending { background: #fef3c7; color: #92400e; }
  .inline-status { margin-top: 8px; font-size: 11.5px; }
  .inline-status.pending-list { color: #8e8e9a; }
  .inline-status.pending-list .names { color: #dc2626; font-weight: 500; }
  .inline-status.all-done { color: #16a34a; font-weight: 500; }

  /* ───── Shared ───── */
  .matrix-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
  .matrix-scroll::-webkit-scrollbar-track { background: #f5f5f5; }
  .matrix-scroll::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
  .matrix-scroll::-webkit-scrollbar-thumb:hover { background: #aaa; }
  .content::-webkit-scrollbar { width: 6px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
  .content::-webkit-scrollbar-thumb:hover { background: #bbb; }

  @media (max-width: 1100px) {
    .v1-summary-cards { grid-template-columns: repeat(2, 1fr); }
    .v2-summary-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ───── Sidebar ───── -->
<aside class="sidebar">
  <div class="sidebar-logo"><div class="logo-icon">N</div><span>NRS</span></div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="#"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 10.5L10 4l7 6.5"/><path d="M5 9.5V16h3.5v-4h3v4H15V9.5"/></svg>홈</a>
    <a class="nav-item" href="#"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="7"/><path d="M10 6v4l2.5 2.5"/></svg>목표</a>
    <a class="nav-item" href="#"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="14" height="12" rx="2"/><path d="M3 8h14M7 4v4M13 4v4"/></svg>할 일</a>
    <a class="nav-item active" href="#"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 10a3 3 0 106 0 3 3 0 00-6 0z"/><path d="M4 16c0-2.2 2.7-4 6-4s6 1.8 6 4"/></svg>팀</a>
    <a class="nav-item" href="#"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 5h12M4 10h12M4 15h8"/></svg>회의</a>

<script>
// ───────────────────────────────────────
// Tab Switching
// ───────────────────────────────────────
let activeTab = 1;
function switchTab(n) {
  activeTab = n;
  document.getElementById('tab1').classList.toggle('active', n === 1);
  document.getElementById('tab2').classList.toggle('active', n === 2);
  document.getElementById('view1').classList.toggle('active', n === 1);
  document.getElementById('view2').classList.toggle('active', n === 2);
  if (n === 2 && !v2Initialized) { V2.render(); v2Initialized = true; }
}
let v2Initialized = false;

// ───────────────────────────────────────
// Shared Data
// ───────────────────────────────────────
const members = [
  { name: '고희중', role: 'leader', dept: '경영전략실장' },
  { name: '박민호', role: 'member', dept: '마케팅 기획실' },
  { name: '김대윤', role: 'member', dept: 'HRP개발팀' },
  { name: '최준원', role: 'member', dept: 'HRP개발팀' },
  { name: '신호찬', role: 'member', dept: 'HRP개발팀' },
  { name: '이정원', role: 'member', dept: '마케팅 기획실' },
  { name: '안장우', role: 'member', dept: '마케팅 기획실' },
  { name: '임정민', role: 'member', dept: 'HRP개발팀' },
  { name: '이현우', role: 'member', dept: '마케팅 기획실' },
  { name: '조성훈', role: 'member', dept: '마케팅 기획실' },
  { name: '이정원B', role: 'member', dept: 'HRP개발팀' },
  { name: '박민호B', role: 'member', dept: 'HRP개발팀' },
];
const avatarColors = ['#6366f1','#f59e0b','#22c55e','#ec4899','#3b82f6','#ef4444','#14b8a6','#8b5cf6','#f97316','#06b6d4','#e11d48','#84cc16'];

// ═══════════════════════════════════════
// VIEW 1: 매트릭스 뷰
// ═══════════════════════════════════════
const V1 = (function() {
  const groups = [
    { name: '상시 지켜야할 것', color: '#7c3aed', bg: '#ede9fe' },
    { name: '매일 해야할 것', color: '#2563eb', bg: '#dbeafe' },
    { name: '매주 해야할 것', color: '#d97706', bg: '#fef3c7' },
    { name: '매월 해야할 것', color: '#db2777', bg: '#fce7f3' },
  ];
  const rules = [
    { id: 1,  group: 0, text: '모든 회의 시 TIRO를 사용하고, 네이밍 룰을 지킨다.', detail: 'TIRO 링크 공유', target: 'all' },
    { id: 2,  group: 0, text: '업무 요청시 타깃날짜 지정 or 수명 시 타깃날짜 엄수', detail: '지연 시 사전 합의', target: 'all' },
    { id: 3,  group: 1, text: '일일업무 공유 및 "핵심과제 & 고객가치" 작성', detail: '팀즈 공유', target: 'all' },
    { id: 4,  group: 1, text: 'NRS 성과 입력', detail: '', target: 'all' },
    { id: 5,  group: 1, text: 'CHO식 회고', detail: '팀즈 공유', target: 'all' },
    { id: 6,  group: 1, text: '금일 회의 리뷰 및 수영업무 현황 업데이트', detail: '', target: 'all' },
    { id: 7,  group: 2, text: '핵심과제 점검', detail: 'WBS 점검 및 업데이트', target: 'all' },
    { id: 8,  group: 2, text: '경전실 오프라인 집단회고', detail: 'KPT 중심', target: 'all' },
    { id: 9,  group: 3, text: 'CHO안 학습', detail: '자인학습회', target: 'all' },
    { id: 10, group: 3, text: '장기업무 일정준수', detail: '자기진단(+2), 하향진단(+4), 최종진단(+5), 일정팀 리포트(+10)', target: 'all' },
    { id: 11, group: 3, text: '매월 3주차에 익월 주요업무 리스트업', detail: '경전실, 전사 관점', target: 'leader' },
    { id: 12, group: 3, text: '자동화/혁신화 아이템 1개 발굴 및 실행', detail: '', target: 'member' },
    { id: 13, group: 3, text: '보고/발표 자료의 템플릿화', detail: '디자인보다는 컨텐츠 관점', target: 'all' },
  ];

  function isRuleApplicableToday(rule) {
    if (rule.group === 0) return true;
    if (rule.group === 1) return true;
    if (rule.group === 2) return new Date().getDay() === 5;
    if (rule.group === 3) return true;
    return true;
  }

  function generateData() {
    const data = {};
    rules.forEach(r => {
      data[r.id] = {};
      members.forEach((m, mi) => {
        const applies = isRuleApplicableToday(r);
        const roleMatch = r.target === 'all' || (r.target === 'leader' && m.role === 'leader') || (r.target === 'member' && m.role === 'member');
        if (!applies || !roleMatch) { data[r.id][mi] = '-'; }
        else {
          const rand = Math.random();
          data[r.id][mi] = (r.id === 2) ? (rand < 0.42 ? 'X' : 'O') : (rand < 0.13 ? 'X' : 'O');
        }
      });
    });
    return data;
  }

  let complianceData = generateData();
  let currentFilter = { group: 'all' };
  let currentView = 'table';
  let collapsedGroups = {};
  const dayNames = ['일','월','화','수','목','금','토'];
  let currentDate = new Date(2026, 2, 5);

  function getFilteredRules() {
    return rules.filter(r => {
      if (currentFilter.group !== 'all' && r.group !== parseInt(currentFilter.group)) return false;
      return true;
    });
  }
  function getFilteredMembers() {
    return members.map((m, i) => ({ ...m, originalIndex: i }));
  }

  function renderMatrix() {
    const filteredRules = getFilteredRules();
    const filteredMembers = getFilteredMembers();
    let headHtml = '<tr><th>그라운드룰</th>';
    filteredMembers.forEach(m => {
      headHtml += `<th><div class="member-name">${m.name.replace('B','')}</div><div class="member-role">${m.role === 'leader' ? '리더' : '구성원'}</div></th>`;
    });
    headHtml += '<th>준수율</th></tr>';
    document.getElementById('v1-matrixHead').innerHTML = headHtml;

    let bodyHtml = '';
    const grouped = {};
    groups.forEach((g, i) => { grouped[i] = []; });
    filteredRules.forEach(r => { if (grouped[r.group] !== undefined) grouped[r.group].push(r); });

    groups.forEach((g, gi) => {
      const groupRules = grouped[gi];
      if (!groupRules || groupRules.length === 0) return;
      const collapsed = collapsedGroups[gi];
      bodyHtml += `<tr class="group-row" onclick="V1.toggleGroup(${gi})">
        <td colspan="${filteredMembers.length + 2}">
          <span class="${collapsed ? 'chevron collapsed' : 'chevron'}">▾</span>
          <span class="group-badge" style="background:${g.bg};color:${g.color}">${g.name}</span>
          <span class="group-count">${groupRules.length}개 규칙</span>
        </td></tr>`;
      if (!collapsed) {
        groupRules.forEach(r => {
          let total = 0, comply = 0;
          filteredMembers.forEach(m => {
            const val = complianceData[r.id][m.originalIndex];
            if (val === 'O') { total++; comply++; } else if (val === 'X') { total++; }
          });
          const rate = total > 0 ? Math.round(comply / total * 100) : null;
          const rc = rate === null ? '' : rate >= 90 ? 'high' : rate >= 70 ? 'mid' : 'low';
          bodyHtml += '<tr>';
          bodyHtml += `<td><div class="rule-name"><span class="rule-text">${r.text}</span>${r.detail ? `<span class="rule-detail">${r.detail}</span>` : ''}</div></td>`;
          filteredMembers.forEach(m => {
            const val = complianceData[r.id][m.originalIndex];
            bodyHtml += val === 'O' ? '<td><span class="cell comply">✓</span></td>' : val === 'X' ? '<td><span class="cell violate">✗</span></td>' : '<td><span class="cell na">—</span></td>';
          });
          bodyHtml += `<td><span class="rate ${rc}">${rate !== null ? rate + '%' : '—'}</span></td></tr>`;
        });
      }
    });
    document.getElementById('v1-matrixBody').innerHTML = bodyHtml;

    let footHtml = '<tr><td>개인별 준수율</td>';
    filteredMembers.forEach(m => {
      let total = 0, comply = 0;
      filteredRules.forEach(r => {
        const val = complianceData[r.id][m.originalIndex];
        if (val === 'O') { total++; comply++; } else if (val === 'X') { total++; }
      });
      const rate = total > 0 ? Math.round(comply / total * 100) : null;
      const rc = rate === null ? '' : rate >= 90 ? 'high' : rate >= 70 ? 'mid' : 'low';
      footHtml += `<td><span class="rate ${rc}">${rate !== null ? rate + '%' : '—'}</span></td>`;
    });
    let oTotal = 0, oComply = 0;
    filteredRules.forEach(r => { filteredMembers.forEach(m => { const val = complianceData[r.id][m.originalIndex]; if (val === 'O') { oTotal++; oComply++; } else if (val === 'X') { oTotal++; } }); });
    const oRate = oTotal > 0 ? Math.round(oComply / oTotal * 100) : 0;
    const oRc = oRate >= 90 ? 'high' : oRate >= 70 ? 'mid' : 'low';
    footHtml += `<td><span class="rate ${oRc}">${oRate}%</span></td></tr>`;
    document.getElementById('v1-matrixFoot').innerHTML = footHtml;
    updateSummary(filteredRules, filteredMembers);
  }

  function renderCardView() {
    const filteredRules = getFilteredRules();
    const filteredMembers = getFilteredMembers();
    let html = '';
    filteredMembers.forEach(m => {
      let total = 0, comply = 0;
      filteredRules.forEach(r => { const val = complianceData[r.id][m.originalIndex]; if (val === 'O') { total++; comply++; } else if (val === 'X') { total++; } });
      const rate = total > 0 ? Math.round(comply / total * 100) : null;
      const rc = rate === null ? '' : rate >= 90 ? 'high' : rate >= 70 ? 'mid' : 'low';
      html += `<div class="person-card"><div class="person-card-header">
        <div class="pc-avatar" style="background:${avatarColors[m.originalIndex % avatarColors.length]}">${m.name[0]}</div>
        <div class="pc-info"><div class="pc-name">${m.name.replace('B','')}</div><div class="pc-role">${m.dept} · ${m.role === 'leader' ? '리더' : '구성원'}</div></div>
        <div class="pc-rate rate ${rc}">${rate !== null ? rate + '%' : '—'}</div>
      </div><div class="person-card-rules">`;
      filteredRules.forEach(r => {
        const val = complianceData[r.id][m.originalIndex];
        const sc = val === 'O' ? 'comply' : val === 'X' ? 'violate' : 'na';
        const si = val === 'O' ? '✓' : val === 'X' ? '✗' : '—';
        const g = groups[r.group];
        html += `<div class="pc-rule"><span class="pc-status ${sc}">${si}</span><span class="pc-rule-text">${r.text}</span><span class="pc-freq" style="background:${g.bg};color:${g.color}">${g.name}</span></div>`;
      });
      html += '</div></div>';
    });
    document.getElementById('v1-personCards').innerHTML = html;
  }

  function updateSummary(filteredRules, filteredMembers) {
    let oTotal = 0, oComply = 0, violations = 0, violators = new Set(), lowRules = 0;
    let lowestRule = null, lowestRate = 100, applicableRuleCount = 0;
    filteredRules.forEach(r => {
      let rTotal = 0, rComply = 0;
      filteredMembers.forEach(m => {
        const val = complianceData[r.id][m.originalIndex];
        if (val === 'O') { rTotal++; rComply++; oTotal++; oComply++; }
        else if (val === 'X') { rTotal++; oTotal++; violations++; violators.add(m.originalIndex); }
      });
      if (rTotal > 0) { applicableRuleCount++; const rate = Math.round(rComply / rTotal * 100); if (rate < 70) lowRules++; if (rate < lowestRate) { lowestRate = rate; lowestRule = r; } }
    });
    const overallRate = oTotal > 0 ? Math.round(oComply / oTotal * 100) : 0;
    document.getElementById('v1-totalRate').textContent = overallRate + '%';
    document.getElementById('v1-totalRules').textContent = applicableRuleCount;
    document.querySelector('#v1-totalRules').closest('.v1-summary-card').querySelector('.sub').textContent = `전체 ${filteredRules.length}개 중`;
    document.getElementById('v1-totalViolations').textContent = violations;
    document.querySelector('#v1-totalViolations').closest('.v1-summary-card').querySelector('.sub').textContent = `${violators.size}명의 팀원`;
    document.getElementById('v1-lowRules').textContent = lowRules;
    if (lowestRule && lowestRate < 80) {
      document.getElementById('v1-alertBar').classList.remove('hidden');
      document.getElementById('v1-alertRuleName').textContent = lowestRule.text;
      document.getElementById('v1-alertRuleRate').textContent = lowestRate + '%';
    } else { document.getElementById('v1-alertBar').classList.add('hidden'); }
  }

  function initGroupChips() {
    const container = document.getElementById('v1-groupFilter');
    groups.forEach((g, i) => {
      const chip = document.createElement('span');
      chip.className = 'chip'; chip.dataset.filter = 'group'; chip.dataset.value = i;
      chip.textContent = g.name; chip.title = g.name;
      container.appendChild(chip);
    });
    container.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentFilter.group = chip.dataset.value === 'all' ? 'all' : chip.dataset.value;
        if (currentView === 'table') renderMatrix(); else renderCardView();
      });
    });
  }

  function updateDateDisplay() {
    const y = currentDate.getFullYear(), mo = currentDate.getMonth() + 1, d = currentDate.getDate(), day = dayNames[currentDate.getDay()];
    document.getElementById('v1-dateText').textContent = `${y}년 ${mo}월 ${d}일 (${day})`;
  }

  initGroupChips();
  renderMatrix();

  return {
    toggleGroup(gi) { collapsedGroups[gi] = !collapsedGroups[gi]; renderMatrix(); },
    switchView(view) {
      currentView = view;
      if (view === 'table') {
        document.getElementById('v1-tableView').classList.remove('hidden');
        document.getElementById('v1-cardView').classList.remove('active');
        document.getElementById('v1-viewTable').classList.add('active');
        document.getElementById('v1-viewCard').classList.remove('active');
        renderMatrix();
      } else {
        document.getElementById('v1-tableView').classList.add('hidden');
        document.getElementById('v1-cardView').classList.add('active');
        document.getElementById('v1-viewTable').classList.remove('active');
        document.getElementById('v1-viewCard').classList.add('active');
        renderCardView();
      }
    },
    changeDate(delta) {
      currentDate.setDate(currentDate.getDate() + delta);
      updateDateDisplay(); complianceData = generateData();
      if (currentView === 'table') renderMatrix(); else renderCardView();
    },
    goToday() {
      currentDate = new Date(2026, 2, 5);
      updateDateDisplay(); complianceData = generateData();
      if (currentView === 'table') renderMatrix(); else renderCardView();
    }
  };
})();

// ═══════════════════════════════════════
// VIEW 2: 프로그레스 대시보드
// ═══════════════════════════════════════
const V2 = (function() {
  const groups = [
    { name: '상시 지켜야할 것', defaultPeriod: 'today', rules: [
      { id: 1, text: '모든 회의 시 TIRO를 사용하고, 네이밍 룰을 지킨다.', detail: 'TIRO 링크 공유' },
      { id: 2, text: '업무 요청시 타깃날짜 지정 or 수명 시 타깃날짜 엄수', detail: '지연 시 사전 합의' },
    ]},
    { name: '매일 해야할 것', defaultPeriod: 'today', rules: [
      { id: 3, text: '일일업무 공유 및 "핵심과제 & 고객가치" 작성', detail: '팀즈 공유' },
      { id: 4, text: 'NRS 성과 입력', detail: '' },
      { id: 5, text: 'CHO식 회고', detail: '팀즈 공유' },
      { id: 6, text: '금일 회의 리뷰 및 수영업무 현황 업데이트', detail: '' },
    ]},
    { name: '매주 해야할 것', defaultPeriod: 'week', rules: [
      { id: 7, text: '핵심과제 점검', detail: 'WBS 점검 및 업데이트' },
      { id: 8, text: '경전실 오프라인 집단회고', detail: 'KPT 중심' },
    ]},
    { name: '매월 해야할 것', defaultPeriod: 'month', rules: [
      { id: 9,  text: 'CHO안 학습', detail: '자인학습회' },
      { id: 10, text: '장기업무 일정준수', detail: '자기진단(+2), 하향진단(+4), 최종진단(+5), 일정팀 리포트(+10)' },
      { id: 11, text: '매월 3주차에 익월 주요업무 리스트업', detail: '경전실, 전사 관점' },
      { id: 12, text: '자동화/혁신화 아이템 1개 발굴 및 실행', detail: '' },
      { id: 13, text: '보고/발표 자료의 템플릿화', detail: '디자인보다는 컨텐츠 관점' },
    ]}
  ];

  function generateCheckRecords() {
    const records = {};
    const today = new Date(2026, 2, 6);
    groups.forEach(g => {
      g.rules.forEach(r => {
        records[r.id] = {};
        members.forEach((m, mi) => {
          const dates = [];
          for (let d = 1; d <= today.getDate(); d++) {
            const date = new Date(2026, 2, d);
            const dow = date.getDay();
            if (dow === 0 || dow === 6) continue;
            let prob = 0;
            if (r.id >= 3 && r.id <= 6) prob = 0.82;
            else if (r.id <= 2) prob = r.id === 2 ? 0.55 : 0.78;
            else if (r.id >= 7 && r.id <= 8) prob = (dow === 5) ? 0.85 : 0.02;
            else prob = 0.15;
            if (Math.random() < prob) {
              const mm = String(date.getMonth() + 1).padStart(2, '0');
              const dd = String(date.getDate()).padStart(2, '0');
              dates.push(`2026-${mm}-${dd}`);
            }
          }
          records[r.id][mi] = dates;
        });
      });
    });
    return records;
  }
  const checkRecords = generateCheckRecords();
  const groupPeriods = {};
  groups.forEach((g, i) => { groupPeriods[i] = g.defaultPeriod; });
  const collapsedGroups = {};

  function getPeriodRange(period) {
    const today = new Date(2026, 2, 6);
    if (period === 'today') return { start: new Date(2026,2,6), end: new Date(2026,2,6) };
    if (period === 'week') {
      const day = today.getDay(), diff = day === 0 ? 6 : day - 1;
      const start = new Date(today); start.setDate(today.getDate() - diff);
      return { start, end: new Date(today) };
    }
    if (period === 'month') return { start: new Date(2026,2,1), end: new Date(today) };
    return { start: today, end: today };
  }
  function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
  function fmtDateKR(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
  function getCheckedDatesInPeriod(ruleId, memberIdx, period) {
    const { start, end } = getPeriodRange(period);
    const dates = checkRecords[ruleId]?.[memberIdx] || [];
    const s = fmtDate(start), e = fmtDate(end);
    return dates.filter(d => d >= s && d <= e);
  }
  function getRateClass(rate) { return rate >= 90 ? 'high' : rate >= 70 ? 'mid' : 'low'; }
  function getPeriodLabel(period) {
    const { start, end } = getPeriodRange(period);
    if (period === 'today') return `오늘 (${fmtDateKR(start)})`;
    if (period === 'week') return `${fmtDateKR(start)} ~ ${fmtDateKR(end)}`;
    return `${start.getMonth()+1}월 ${fmtDateKR(start)} ~ ${fmtDateKR(end)}`;
  }

  function render() {
    let totalDone = 0, totalApplicable = 0, lowRuleCount = 0;
    const groupData = groups.map((g, gi) => {
      const period = groupPeriods[gi];
      const rulesData = g.rules.map(r => {
        let done = 0;
        const memberStatuses = members.map((m, mi) => {
          const checked = getCheckedDatesInPeriod(r.id, mi, period);
          const isDone = checked.length > 0;
          if (isDone) done++;
          return { name: m.name.replace('B',''), isDone, lastDate: checked.length ? checked[checked.length-1] : null };
        });
        const rate = Math.round(done / members.length * 100);
        totalDone += done; totalApplicable += members.length;
        if (rate < 70) lowRuleCount++;
        return { ...r, done, applicable: members.length, rate, memberStatuses };
      });
      const gDone = rulesData.reduce((s,r) => s + r.done, 0);
      const gTotal = rulesData.reduce((s,r) => s + r.applicable, 0);
      const groupRate = gTotal > 0 ? Math.round(gDone / gTotal * 100) : 0;
      return { ...g, rulesData, groupRate, period };
    });
    const overallRate = totalApplicable > 0 ? Math.round(totalDone / totalApplicable * 100) : 0;

    document.getElementById('v2-summaryRow').innerHTML = `
      <div class="v2-summary-card"><div class="s-label">전체 준수율</div><div class="s-value ${getRateClass(overallRate)}">${overallRate}%</div><div class="s-sub">각 그룹 기간 기준 합산</div></div>
      <div class="v2-summary-card"><div class="s-label">미완료 건수</div><div class="s-value red">${totalApplicable - totalDone}</div><div class="s-sub">전체 ${totalApplicable}건 중</div></div>
      <div class="v2-summary-card"><div class="s-label">주의 규칙</div><div class="s-value ${lowRuleCount > 0 ? 'red' : 'green'}">${lowRuleCount}</div><div class="s-sub">준수율 70% 미만</div></div>`;

    let html = '';
    groupData.forEach((g, gi) => {
      const collapsed = collapsedGroups[gi];
      const rc = getRateClass(g.groupRate);
      const period = groupPeriods[gi];
      html += `<div class="rule-group"><div class="group-header">
        <div class="group-header-top" onclick="V2.toggleGroup(${gi})">
          <div class="group-header-left">
            <span class="group-chevron ${collapsed ? 'collapsed' : ''}">▾</span>
            <span class="group-name">${g.name}</span>
            <span class="group-rule-count">${g.rulesData.length}개</span>
          </div>
          <div class="group-header-right">
            <div class="group-bar-mini"><div class="group-bar-mini-fill ${rc}" style="width:${g.groupRate}%"></div></div>
            <span class="group-rate ${rc}">${g.groupRate}%</span>
          </div>
        </div>
        <div class="group-header-bottom">
          <div class="group-period-chips">
            <span class="gp-chip ${period==='today'?'active':''}" onclick="event.stopPropagation();V2.setGroupPeriod(${gi},'today')">오늘</span>
            <span class="gp-chip ${period==='week'?'active':''}" onclick="event.stopPropagation();V2.setGroupPeriod(${gi},'week')">이번 주</span>
            <span class="gp-chip ${period==='month'?'active':''}" onclick="event.stopPropagation();V2.setGroupPeriod(${gi},'month')">이번 달</span>
          </div>
          <span class="group-period-info">${getPeriodLabel(period)}</span>
        </div>
      </div><div class="rule-list ${collapsed ? 'collapsed' : ''}">`;

      g.rulesData.forEach(r => {
        const rc2 = getRateClass(r.rate);
        const done = r.memberStatuses.filter(m => m.isDone);
        const pending = r.memberStatuses.filter(m => !m.isDone);
        html += `<div class="rule-item"><div class="rule-item-top">
          <div class="v2-rule-text">${r.text}${r.detail ? `<div class="rule-detail-label">${r.detail}</div>` : ''}</div>
          <div class="rule-stats">${r.rate < 70 ? '<span class="rule-warn">!</span>' : ''}
            <span class="rule-count">${r.done}/${r.applicable}명</span>
            <span class="rule-rate ${rc2}">${r.rate}%</span>
          </div></div>
          <div class="progress-row"><div class="progress-bar"><div class="progress-fill ${rc2}" style="width:${r.rate}%"></div></div></div>`;
        if (r.rate === 100) { html += '<div class="inline-status all-done">✓ 전원 완료</div>'; }
        else if (pending.length <= 6) { html += `<div class="inline-status pending-list">미완: <span class="names">${pending.map(m=>m.name).join(', ')}</span></div>`; }
        else { html += `<div class="inline-status pending-list">미완: <span class="names">${pending.slice(0,5).map(m=>m.name).join(', ')} 외 ${pending.length-5}명</span></div>`; }
        html += `<span class="detail-toggle" onclick="V2.toggleDetail(this)">상세 보기 ▾</span>
          <div class="rule-detail-panel">
            <div class="member-section"><div class="member-section-label">완료 (${done.length}명)</div>
              <div class="member-pills">${done.map(m => { const ds = m.lastDate ? m.lastDate.slice(5).replace('-','/') : ''; return `<span class="member-pill done">${m.name} <span class="pill-date">${ds}</span></span>`; }).join('')}</div></div>
            ${pending.length > 0 ? `<div class="member-section" style="margin-top:8px;"><div class="member-section-label">미완료 (${pending.length}명)</div>
              <div class="member-pills">${pending.map(m => `<span class="member-pill pending">${m.name}</span>`).join('')}</div></div>` : ''}
          </div></div>`;
      });
      html += '</div></div>';
    });
    document.getElementById('v2-groupContainer').innerHTML = html;
  }

  return {
    render,
    toggleGroup(idx) { collapsedGroups[idx] = !collapsedGroups[idx]; render(); },
    setGroupPeriod(gi, period) { groupPeriods[gi] = period; render(); },
    toggleDetail(el) {
      const panel = el.nextElementSibling;
      panel.classList.toggle('open');
      el.textContent = panel.classList.contains('open') ? '접기 ▴' : '상세 보기 ▾';
    }
  };
})();
</script>
</body>
</html>
